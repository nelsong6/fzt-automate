name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: windows
            goos: windows
            goarch: amd64
            ext: .exe
            output: fzt-automate-windows-amd64.exe
          - name: linux
            goos: linux
            goarch: amd64
            ext: ""
            output: fzt-automate-linux-amd64
          - name: darwin
            goos: darwin
            goarch: arm64
            ext: ""
            output: fzt-automate-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compute version
        id: version
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            echo "version=v0.1.0" >> $GITHUB_OUTPUT
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            echo "version=v0.1.$((patch + 1))" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get engine version from go.mod
        id: engine
        run: echo "version=$(grep 'github.com/nelsong6/fzt ' go.mod | awk '{print $2}')" >> $GITHUB_OUTPUT
      - run: >
          go build
          -ldflags="-X github.com/nelsong6/fzt/render.Version=${{ steps.version.outputs.version }}
          -X github.com/nelsong6/fzt-frontend.EngineVersion=${{ steps.engine.outputs.version }}"
          -o ${{ matrix.output }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute version
        id: version
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty' 2>/dev/null || echo "")
          if [ -z "$latest" ]; then
            echo "version=v0.1.0" >> $GITHUB_OUTPUT
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            echo "version=v0.1.$((patch + 1))" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          mkdir -p release
          cp artifacts/windows/fzt-automate-windows-amd64.exe release/
          cp artifacts/linux/fzt-automate-linux-amd64 release/
          cp artifacts/darwin/fzt-automate-darwin-arm64 release/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            release/* \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
